<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>QuestFlow — Gestão Completa + Btcc</title>
    <!-- Fontes e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0B1120, #0F172A);
            color: #F8FAFC;
            overflow-x: hidden;
            line-height: 1.5;
        }
        h1, h2, h3, h4, .card-title, .logo-text h1 { font-weight: 700; letter-spacing: -0.01em; }
        .card-title { font-size: 1.4rem; font-weight: 700; color: #FFB347; }
        p, li, .task-item, .chip, .nav-item span, label { font-weight: 400; }
        .streak-badge, .btcc-badge, .report-btn-header, .primary-btn { font-weight: 600; }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .tab-content { animation: fadeSlideUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        button, .nav-item, .fab-btn { transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        button:active, .nav-item:active { transform: scale(0.96); }
        .app-container { max-width: 1300px; margin: 0 auto; padding: 20px 24px 90px; }
        .header {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;
            margin-bottom: 20px; padding: 12px 24px; background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px);
            border-radius: 48px; border: 1px solid rgba(255, 123, 0, 0.2); box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .logo { display: flex; align-items: center; gap: 14px; }
        .logo-icon {
            width: 48px; height: 48px; border-radius: 50%; background: rgba(255, 123, 0, 0.15);
            display: flex; align-items: center; justify-content: center; box-shadow: 0 0 12px rgba(255, 123, 0, 0.5);
            border: 1px solid rgba(255, 123, 0, 0.4);
        }
        .logo-icon img { width: 32px; height: 32px; object-fit: contain; filter: drop-shadow(0 0 4px #FF7B00); }
        .logo-text h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #FF7B00, #FFB347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-text p { font-size: 0.7rem; color: #94A3B8; font-weight: 500; }
        .streak-badge, .btcc-badge { background: linear-gradient(135deg, #2A2A35, #1E293B); padding: 8px 20px; border-radius: 60px; display: flex; align-items: center; gap: 12px; font-weight: 700; border: 1px solid rgba(250,204,21,0.3); }
        .btcc-badge { color: #FACC15; border-color: rgba(250,204,21,0.5); }
        .btcc-badge i { color: #F6B83E; }
        .report-btn-header {
            background: linear-gradient(95deg, #FF7B00, #6366F1);
            border: none; padding: 10px 24px; border-radius: 40px; font-weight: 600; color: white;
            cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 12px rgba(255,123,0,0.3);
        }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(20px); display: flex; gap: 8px; padding: 8px 20px; border-radius: 60px; border: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: transparent; border: none; font-size: 0.7rem; font-weight: 500; color: #94A3B8; cursor: pointer; padding: 8px 16px; border-radius: 40px; }
        .nav-item i { font-size: 1.3rem; }
        .nav-item.active { color: #FF7B00; background: rgba(255, 123, 0, 0.15); transform: translateY(-2px); }
        .fab-btn { position: fixed; bottom: 100px; right: 24px; background: linear-gradient(135deg, #FF7B00, #6366F1); width: 56px; height: 56px; border-radius: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(255,123,0,0.5); z-index: 110; cursor: pointer; }
        .card { background: #1E293B; border-radius: 32px; padding: 28px; border: 1px solid rgba(255, 123, 0, 0.15); box-shadow: 0 15px 35px -12px rgba(0,0,0,0.4); transition: all 0.25s ease; margin-bottom: 28px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #CBD5E1; }
        input, select, textarea { width: 100%; padding: 12px 16px; background: #0F172A; border: 1px solid #334155; border-radius: 24px; color: white; font-family: inherit; }
        button.primary-btn { background: linear-gradient(95deg, #FF7B00, #6366F1); border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; width: 100%; }
        .data-table { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px 8px; border-bottom: 1px solid #334155; }
        th { color: #FFB347; font-weight: 600; }
        .action-btn { background: none; border: none; color: #FF7B00; cursor: pointer; margin: 0 4px; font-size: 1rem; }
        .sub-nav { display: flex; gap: 12px; margin-bottom: 24px; border-bottom: 1px solid #334155; padding-bottom: 12px; flex-wrap: wrap; }
        .sub-nav-item { background: transparent; border: none; padding: 8px 20px; border-radius: 40px; color: #94A3B8; cursor: pointer; font-weight: 500; }
        .sub-nav-item.active { background: #FF7B00; color: white; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1E293B; border-left: 4px solid #FF7B00; padding: 12px 24px; border-radius: 60px; z-index: 1000; animation: fadeSlideUp 0.2s ease; }
        .loading-overlay { position: fixed; top:0;left:0;width:100%;height:100%;background: rgba(15,23,42,0.9);backdrop-filter: blur(12px);display: flex;align-items: center;justify-content: center;z-index: 1000;visibility: hidden;opacity: 0;transition: 0.2s; }
        .loading-overlay.active { visibility: visible; opacity: 1; }
        .spinner { width: 48px; height: 48px; border: 4px solid #2A2A35; border-top: 4px solid #FF7B00; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #334155; }
        .progress-bar { height: 12px; background: #0F172A; border-radius: 20px; overflow: hidden; margin: 8px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #FF7B00, #FFB347); border-radius: 20px; width: 0%; }
        .timer-display { font-size: 4rem; font-weight: 800; text-align: center; font-variant-numeric: tabular-nums; }
        .chip { background: #2A2A35; padding: 4px 12px; border-radius: 40px; font-size: 0.8rem; }
        .frase-motivacional { background: rgba(99, 102, 241, 0.15); padding: 16px 24px; border-radius: 60px; text-align: center; font-style: italic; border-left: 4px solid #6366F1; margin-bottom: 24px; }
        .disciplina-card, .assunto-card, .legislacao-card { background: #0F172A; border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid #334155; }
        .badge-desempenho { padding: 6px 12px; border-radius: 40px; font-weight: 600; font-size: 0.8rem; }
        .color-ruim { background: #7F1D1D; color: #FCA5A5; }
        .color-regular { background: #854D0E; color: #FDE047; }
        .color-bom { background: #166534; color: #86EFAC; }
        .color-muitobom { background: #1E3A8A; color: #93C5FD; }
        .color-excelente { background: #6B21A8; color: #D8B4FE; }
        .clickable { cursor: pointer; }
        @media (max-width: 680px) { .app-container { padding: 16px; } }
    </style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="app-container" id="app">
    <div class="header">
        <div class="logo">
            <div class="logo-icon">
                <img src="https://cdn-icons-png.flaticon.com/512/2276/2276592.png" alt="Capacete guerreiro">
            </div>
            <div class="logo-text">
                <h1>QuestFlow</h1>
                <p>performance & evolução</p>
            </div>
        </div>
        <div style="display: flex; gap: 12px;">
            <div class="streak-badge"><i class="fas fa-fire"></i> <span id="streakValue">0</span> dias</div>
            <div class="btcc-badge"><i class="fas fa-coins"></i> <span id="btccSaldo">0</span> Btcc</div>
        </div>
        <button id="reportHeaderBtn" class="report-btn-header">
            <img src="https://cdn-icons-png.flaticon.com/512/8328/8328461.png" alt="Relatório" style="width:20px;height:20px;">
            Relatórios
        </button>
    </div>
    <div id="tabContent" class="tab-content"></div>
    <footer style="text-align:center; margin-top:40px; font-size:0.7rem; color:#475569;">⚡ Gestão completa • CRUD integrado com SheetDB • Btcc motivacional</footer>
</div>
<div class="bottom-nav" id="bottomNav">
    <button class="nav-item active" data-tab="dashboard"><i class="fas fa-chart-line"></i><span>Visão</span></button>
    <button class="nav-item" data-tab="desempenho"><i class="fas fa-trophy"></i><span>Desempenho</span></button>
    <button class="nav-item" data-tab="planner"><i class="fas fa-calendar-week"></i><span>Plano</span></button>
    <button class="nav-item" data-tab="gestao"><i class="fas fa-database"></i><span>Gestão</span></button>
    <button class="nav-item" data-tab="reports"><i class="fas fa-chart-simple"></i><span>Relatórios</span></button>
    <button class="nav-item" data-tab="focus"><i class="fas fa-clock"></i><span>Foco</span></button>
</div>
<div class="fab-btn" id="fabFocusBtn"><i class="fas fa-play"></i></div>

<script>
// ====================== CONFIGURAÇÃO SHEETDB ======================
const BASE_API = "https://sheetdb.io/api/v1/yzz4a1hv8hm9w";

// Estados globais (unificados)
let resumo = [], disciplinas = [], planoDiario = [], revisoes = [], questoes = [];
let planoEstudo = [], conteudos = [], estatisticas = [], sessoes = [], notificacoes = [], legislacao = [];
let activeTab = "dashboard";
let activeSubTab = "conteudo";
let disciplinaSelecionada = null;
let ultimaFrase = "";

// Frases motivacionais
const frasesMotivacionais = [
    "✨ Cada questão te aproxima da vaga.", "🚀 Você está mais perto do que imagina.",
    "💪 Constância vence talento.", "🌟 Só de estar aqui já é progresso.",
    "📈 Quem continua, chega.", "📚 Um dia de cada vez.",
    "🎯 Você não parou — isso já é vitória.", "👣 Pequenos passos também contam.",
    "🧠 Foco no processo, o resultado vem.", "⚡ Persistir é o que te diferencia."
];

// Helpers
function showToast(msg, type='info') {
    const toast = document.createElement('div'); 
    toast.className = 'toast'; 
    toast.innerHTML = `<i class="fas ${type==='error'?'fa-exclamation-triangle':'fa-check-circle'}"></i> ${msg}`;
    document.body.appendChild(toast); setTimeout(()=>toast.remove(), 3000);
}
function showLoading(show) { 
    document.getElementById('loadingOverlay').classList[show?'add':'remove']('active'); 
}

// ====================== CRUD ======================
async function fetchSheet(sheet) {
    const resp = await fetch(`${BASE_API}?sheet=${sheet}`);
    if(!resp.ok) throw new Error(`Erro ao buscar ${sheet}`);
    return await resp.json();
}
async function addRow(sheet, row) {
    const resp = await fetch(`${BASE_API}?sheet=${sheet}`, {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ data: [row] })
    });
    if(!resp.ok) throw new Error(`Erro ao adicionar em ${sheet}`);
    return await resp.json();
}
async function updateRow(sheet, id, data) {
    const resp = await fetch(`${BASE_API}/id/${id}?sheet=${sheet}`, {
        method: "PUT", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ data })
    });
    if(!resp.ok) throw new Error(`Erro ao atualizar ${sheet}`);
    return await resp.json();
}
async function deleteRow(sheet, id) {
    const resp = await fetch(`${BASE_API}/id/${id}?sheet=${sheet}`, { method: "DELETE" });
    if(!resp.ok) throw new Error(`Erro ao deletar de ${sheet}`);
    return await resp.json();
}

// ====================== CARREGAR DADOS ======================
async function loadAllData() {
    showLoading(true);
    try {
        [resumo, disciplinas, planoDiario, revisoes, questoes, planoEstudo, conteudos, estatisticas, sessoes, notificacoes, legislacao] = await Promise.all([
            fetchSheet("RESUMO").catch(()=>[]), fetchSheet("DISCIPLINAS").catch(()=>[]),
            fetchSheet("PLANO_DIARIO").catch(()=>[]), fetchSheet("REVISOES").catch(()=>[]),
            fetchSheet("QUESTOES").catch(()=>[]), fetchSheet("PLANO_ESTUDO").catch(()=>[]),
            fetchSheet("CONTEUDO").catch(()=>[]), fetchSheet("ESTATISTICAS").catch(()=>[]),
            fetchSheet("SESSOES").catch(()=>[]), fetchSheet("NOTIFICACOES").catch(()=>[]),
            fetchSheet("LEGISLACAO").catch(()=>[])
        ]);
        updateStreak();
        calcularBtcc();
        renderCurrentTab();
    } catch(e) { showToast("Erro: "+e.message, "error"); }
    finally { showLoading(false); }
}

function updateStreak() {
    if(!sessoes.length) return;
    const dates = [...new Set(sessoes.map(s => s.Data ? new Date(s.Data).toDateString() : null).filter(d=>d))];
    let streak = 0, cur = new Date();
    while(dates.includes(cur.toDateString())) { streak++; cur.setDate(cur.getDate()-1); }
    document.getElementById('streakValue').innerText = streak;
}

function classificarDesempenho(p) {
    if(p<50) return 'Ruim'; if(p<70) return 'Regular'; if(p<85) return 'Bom'; if(p<95) return 'Muito Bom'; return 'Excelente';
}
function calcularBtcc() {
    let total = 0;
    const discMap = new Map();
    questoes.forEach(q => {
        const d = q.Disciplina || 'Geral';
        if(!discMap.has(d)) discMap.set(d, {c:0,e:0});
        const v = discMap.get(d);
        (q['Acerto (1/0)'] || q.Acerto) == 1 ? v.c++ : v.e++;
    });
    for(let [_,{c,e}] of discMap) {
        const perc = (c+e) ? (c/(c+e))*100 : 0;
        if(perc>=95) total+=12; else if(perc>=85) total+=8; else if(perc>=70) total+=5; else if(perc>=50) total+=2;
    }
    const streak = parseInt(document.getElementById('streakValue')?.innerText||0);
    if(streak>=15) total+=15; else if(streak>=7) total+=7; else if(streak>=3) total+=3;
    document.getElementById('btccSaldo').innerText = total;
}

// ====================== RENDER PRINCIPAL ======================
function renderCurrentTab() {
    const c = document.getElementById('tabContent');
    if(activeTab === 'gestao') UIRenderer.renderGestao(c);
    else if(activeTab === 'dashboard') UIRenderer.renderDashboard(c);
    else if(activeTab === 'desempenho') UIRenderer.renderDesempenho(c);
    else if(activeTab === 'planner') UIRenderer.renderPlanner(c);
    else if(activeTab === 'reports') UIRenderer.renderReports(c);
    else if(activeTab === 'focus') UIRenderer.renderFocusMode(c);
}

const UIRenderer = {
    // ---------- DASHBOARD (com frases e Btcc) ----------
    renderDashboard(container) {
        let totalHoras = sessoes.reduce((a,s)=> a + (parseFloat(s.Duracao_Min||0)/60), 0);
        let certas = questoes.filter(q => (q['Acerto (1/0)']||q.Acerto)==1).length;
        let erradas = questoes.length - certas;
        let perc = questoes.length ? (certas/questoes.length)*100 : 0;
        let frase = frasesMotivacionais[Math.floor(Math.random()*frasesMotivacionais.length)];
        while(frase === ultimaFrase && frasesMotivacionais.length>1) frase = frasesMotivacionais[Math.floor(Math.random()*frasesMotivacionais.length)];
        ultimaFrase = frase;
        container.innerHTML = `
            <div class="frase-motivacional">✨ ${frase}</div>
            <div class="card"><div class="card-title"><i class="fas fa-chart-line"></i> Visão Geral</div>
                <div class="task-item"><span>📊 Média geral</span><strong>${perc.toFixed(1)}%</strong></div>
                <div class="task-item"><span>✅ Certas / ❌ Erradas</span><strong>${certas} / ${erradas}</strong></div>
                <div class="task-item"><span>⏱ Total Horas</span><strong>${totalHoras.toFixed(1)}h</strong></div>
                <div class="progress-bar"><div class="progress-fill" style="width:${perc}%"></div></div>
            </div>
            <div class="card"><div class="card-title"><i class="fas fa-chart-bar"></i> Desempenho por Disciplina</div><canvas id="barrasDisciplina" height="150"></canvas></div>
            <div class="card"><div class="card-title"><i class="fas fa-history"></i> Últimas Sessões</div><div id="ultimasSessoes"></div></div>
        `;
        setTimeout(() => {
            const ctx = document.getElementById('barrasDisciplina')?.getContext('2d');
            if(!ctx) return;
            const discMap = new Map();
            questoes.forEach(q => {
                const d = q.Disciplina || 'Outros';
                if(!discMap.has(d)) discMap.set(d, {c:0,e:0});
                const v = discMap.get(d);
                (q['Acerto (1/0)'] || q.Acerto) == 1 ? v.c++ : v.e++;
            });
            const labels = [], data = [], colors = [];
            for(let [disc, {c,e}] of discMap) {
                const p = (c+e) ? (c/(c+e))*100 : 0;
                labels.push(disc); data.push(p);
                colors.push(p<50 ? '#EF4444' : (p<70 ? '#FACC15' : '#22C55E'));
            }
            new Chart(ctx, { type:'bar', data:{ labels, datasets:[{ label:'% Acerto', data, backgroundColor: colors }] } });
        }, 100);
        let ultimas = [...sessoes].sort((a,b)=> new Date(b.Data)-new Date(a.Data)).slice(0,5);
        document.getElementById('ultimasSessoes').innerHTML = ultimas.map(s=>`<div class="task-item"><span>${s.Data||'—'}</span><span>${s.Disciplina||'?'}</span><span>${s.Duracao_Min||0}min</span></div>`).join('');
    },

    // ---------- DESEMPENHO (Disciplinas > Assuntos + Legislação) ----------
    renderDesempenho(container) {
        if (disciplinaSelecionada) { this.renderAssuntos(container, disciplinaSelecionada); return; }
        container.innerHTML = `
            <div class="sub-nav">
                <button class="sub-nav-item active" data-sub="disciplinas">📚 Disciplinas</button>
                <button class="sub-nav-item" data-sub="legislacao">⚖️ Legislação</button>
                <button class="sub-nav-item" id="btnVoltarDisciplina" style="display:none;"><i class="fas fa-arrow-left"></i> Voltar</button>
            </div>
            <div id="subDesempenho"></div>
        `;
        const sub = document.getElementById('subDesempenho');
        sub.innerHTML = `<div class="card"><div class="card-title">🏆 Disciplinas</div><div id="listaDisciplinas"></div>
            <button class="primary-btn" id="btnAddDisciplinaDesempenho"><i class="fas fa-plus"></i> Adicionar Disciplina</button></div>`;
        const discMap = new Map();
        questoes.forEach(q => {
            const d = q.Disciplina || 'Geral';
            if(!discMap.has(d)) discMap.set(d, {c:0,e:0});
            const v = discMap.get(d);
            (q['Acerto (1/0)'] || q.Acerto) == 1 ? v.c++ : v.e++;
        });
        disciplinas.forEach(d => { if(!discMap.has(d.Disciplina)) discMap.set(d.Disciplina, {c:0,e:0}); });
        let cards = '';
        for(let [nome, {c,e}] of discMap) {
            const total = c+e, perc = total ? (c/total)*100 : 0;
            const nivel = classificarDesempenho(perc);
            const cor = nivel === 'Ruim' ? 'color-ruim' : (nivel === 'Regular' ? 'color-regular' : (nivel === 'Bom' ? 'color-bom' : (nivel === 'Muito Bom' ? 'color-muitobom' : 'color-excelente')));
            cards += `<div class="disciplina-card clickable" data-disciplina="${nome}">
                <div style="display:flex; justify-content:space-between;"><h3>${nome}</h3><span class="badge-desempenho ${cor}">${nivel}</span></div>
                <div class="task-item"><span>✅ ${c} certas</span><span>❌ ${e} erradas</span></div>
                <div class="task-item"><span>📊 ${perc.toFixed(1)}%</span></div>
                <div class="progress-bar"><div class="progress-fill" style="width:${perc}%"></div></div>
                <div style="margin-top:8px;"><i class="fas fa-chevron-right"></i> Ver assuntos</div>
            </div>`;
        }
        document.getElementById('listaDisciplinas').innerHTML = cards || '<p>Nenhuma disciplina.</p>';
        document.querySelectorAll('.disciplina-card').forEach(c => c.addEventListener('click', () => {
            disciplinaSelecionada = c.dataset.disciplina; renderCurrentTab();
        }));
        document.getElementById('btnAddDisciplinaDesempenho').onclick = async () => {
            const nome = prompt('Nome da disciplina:'); if(!nome) return;
            await addRow("DISCIPLINAS", { Disciplina: nome, 'Total Tópicos': 0, 'Tópicos Concluídos': 0, Horas: 0 });
            showToast('Disciplina adicionada!'); await loadAllData();
        };
        document.querySelector('[data-sub="legislacao"]').onclick = () => this.renderLegislacao(container);
    },

    renderAssuntos(container, disciplina) {
        container.innerHTML = `
            <div class="sub-nav">
                <button class="sub-nav-item" id="voltarDisciplinas"><i class="fas fa-arrow-left"></i> Disciplinas</button>
                <button class="sub-nav-item active">📖 ${disciplina}</button>
            </div>
            <div class="card"><div class="card-title">📌 Assuntos de ${disciplina}</div><div id="listaAssuntos"></div>
                <button class="primary-btn" id="btnAddAssunto"><i class="fas fa-plus"></i> Adicionar Assunto</button></div>
        `;
        const assuntosFiltrados = conteudos.filter(c => c.Disciplina === disciplina);
        const assuntoMap = new Map();
        questoes.filter(q => q.Disciplina === disciplina).forEach(q => {
            const a = q.Assunto || 'Geral';
            if(!assuntoMap.has(a)) assuntoMap.set(a, {c:0,e:0});
            const v = assuntoMap.get(a);
            (q['Acerto (1/0)'] || q.Acerto) == 1 ? v.c++ : v.e++;
        });
        let html = '';
        assuntosFiltrados.forEach(ass => {
            const nome = ass.Assunto;
            const stats = assuntoMap.get(nome) || {c:0,e:0};
            const total = stats.c + stats.e, perc = total ? (stats.c/total)*100 : 0;
            const nivel = classificarDesempenho(perc);
            const cor = nivel === 'Ruim' ? 'color-ruim' : (nivel === 'Regular' ? 'color-regular' : (nivel === 'Bom' ? 'color-bom' : (nivel === 'Muito Bom' ? 'color-muitobom' : 'color-excelente')));
            html += `<div class="assunto-card">
                <div style="display:flex; justify-content:space-between;"><h4>${nome}</h4><span class="badge-desempenho ${cor}">${nivel}</span></div>
                <div class="task-item"><span>✅ ${stats.c}</span><span>❌ ${stats.e}</span></div>
                <div class="task-item"><span>📊 ${perc.toFixed(1)}%</span></div>
                <div class="progress-bar"><div class="progress-fill" style="width:${perc}%"></div></div>
            </div>`;
        });
        document.getElementById('listaAssuntos').innerHTML = html || '<p>Nenhum assunto cadastrado.</p>';
        document.getElementById('voltarDisciplinas').onclick = () => { disciplinaSelecionada = null; renderCurrentTab(); };
        document.getElementById('btnAddAssunto').onclick = async () => {
            const nome = prompt('Nome do assunto:'); if(!nome) return;
            await addRow("CONTEUDO", { Disciplina: disciplina, Assunto: nome, Subassunto: '', Peso: 1, Status: 'Pendente' });
            showToast('Assunto adicionado!'); await loadAllData(); disciplinaSelecionada = disciplina; renderCurrentTab();
        };
    },

    renderLegislacao(container) {
        container.innerHTML = `
            <div class="sub-nav">
                <button class="sub-nav-item active">⚖️ Legislação</button>
                <button class="sub-nav-item" id="btnVoltarLegislacao" style="display:none;"><i class="fas fa-arrow-left"></i> Voltar</button>
            </div>
            <div id="legislacaoContent"></div>
        `;
        this.renderListaLegislacao(document.getElementById('legislacaoContent'));
    },
    renderListaLegislacao(container) {
        container.innerHTML = `<div class="card"><div class="card-title">📜 Legislações</div><div id="listaLeis"></div>
            <button class="primary-btn" id="btnAddLegislacao"><i class="fas fa-plus"></i> Adicionar Legislação</button></div>`;
        let leisHtml = '';
        legislacao.forEach(lei => {
            const prog = [lei.Lido, lei.Revisado, lei.Esquematizado, lei.Questoes].filter(v => v=='true'||v===true).length * 25;
            leisHtml += `<div class="legislacao-card clickable" data-id="${lei._id}">
                <h4>${lei.Nome}</h4><div class="task-item"><span>Progresso</span><strong>${prog}%</strong></div>
                <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
                <div style="margin-top:8px;"><i class="fas fa-edit"></i> Editar checklist</div>
            </div>`;
        });
        document.getElementById('listaLeis').innerHTML = leisHtml || '<p>Nenhuma legislação.</p>';
        document.querySelectorAll('.legislacao-card').forEach(c => c.addEventListener('click', () => this.renderDetalheLegislacao(container, c.dataset.id)));
        document.getElementById('btnAddLegislacao').onclick = async () => {
            const nome = prompt('Nome da lei:'); if(!nome) return;
            await addRow("LEGISLACAO", { Nome: nome, Lido: false, Revisado: false, Esquematizado: false, Questoes: false });
            showToast('Legislação adicionada!'); await loadAllData(); this.renderListaLegislacao(container);
        };
    },
    renderDetalheLegislacao(container, id) {
        const lei = legislacao.find(l => l._id === id); if(!lei) return;
        container.innerHTML = `
            <div class="sub-nav">
                <button class="sub-nav-item" id="voltarLegislacao"><i class="fas fa-arrow-left"></i> Legislações</button>
                <button class="sub-nav-item active">${lei.Nome}</button>
            </div>
            <div class="card"><div class="card-title">✅ Checklist</div><div id="checklistLeg"></div><div id="mensagemParabens"></div></div>
        `;
        const state = {
            lido: lei.Lido=='true'||lei.Lido===true, revisado: lei.Revisado=='true'||lei.Revisado===true,
            esquematizado: lei.Esquematizado=='true'||lei.Esquematizado===true, questoes: lei.Questoes=='true'||lei.Questoes===true
        };
        const update = async () => {
            const prog = [state.lido, state.revisado, state.esquematizado, state.questoes].filter(v=>v).length * 25;
            document.getElementById('mensagemParabens').innerHTML = prog===100 ? '<div style="background:#166534; padding:16px; border-radius:24px;">🎉 Parabéns! Você concluiu completamente o estudo dessa legislação!</div>' : '';
            await updateRow("LEGISLACAO", id, { Lido: state.lido, Revisado: state.revisado, Esquematizado: state.esquematizado, Questoes: state.questoes });
            await loadAllData();
        };
        document.getElementById('checklistLeg').innerHTML = `
            <label><input type="checkbox" id="chkLido" ${state.lido?'checked':''}> 📖 Lido</label>
            <label><input type="checkbox" id="chkRevisado" ${state.revisado?'checked':''}> 🔁 Revisado</label>
            <label><input type="checkbox" id="chkEsquematizado" ${state.esquematizado?'checked':''}> 📝 Esquematizado</label>
            <label><input type="checkbox" id="chkQuestoes" ${state.questoes?'checked':''}> ❓ Questões simuladas</label>
        `;
        document.getElementById('chkLido').onchange = e => { state.lido = e.target.checked; update(); };
        document.getElementById('chkRevisado').onchange = e => { state.revisado = e.target.checked; update(); };
        document.getElementById('chkEsquematizado').onchange = e => { state.esquematizado = e.target.checked; update(); };
        document.getElementById('chkQuestoes').onchange = e => { state.questoes = e.target.checked; update(); };
        document.getElementById('voltarLegislacao').onclick = () => this.renderLegislacao(container);
        update();
    },

    // ---------- PLANO (antigo) ----------
    renderPlanner(container) {
        let planos = planoEstudo.length ? planoEstudo : planoDiario;
        container.innerHTML = `<div class="card"><div class="card-title"><i class="fas fa-calendar-alt"></i> Planejamento</div><div id="planList"></div>
            <button class="primary-btn" id="btnAddPlanoRapido"><i class="fas fa-plus"></i> Adicionar rápido</button></div>`;
        let html = planos.slice(0,10).map(p => `<div class="task-item"><span>📖 ${p.Disciplina||p.Tipo||'Estudo'}</span><span class="chip">${p.Tempo_Min||p.Tempo_Planejado||'?'} min</span></div>`).join('');
        document.getElementById('planList').innerHTML = html || '<p>Nenhum plano. Use a aba Gestão.</p>';
        document.getElementById('btnAddPlanoRapido').onclick = async () => {
            const disc = prompt('Disciplina:'); if(!disc) return;
            const tempo = prompt('Tempo (min):');
            await addRow("PLANO_ESTUDO", { Data: new Date().toISOString().slice(0,10), Disciplina: disc, Tipo: 'Plano', Tempo_Min: tempo, Prioridade: 'Média' });
            showToast('Plano adicionado!'); await loadAllData();
        };
    },

    // ---------- RELATÓRIOS (antigo) ----------
    renderReports(container) {
        if(!sessoes.length) { container.innerHTML = '<div class="card">Nenhuma sessão registrada.</div>'; return; }
        let horasPorDia = sessoes.reduce((a,s)=>{ let d=s.Data; if(d) a[d]=(a[d]||0)+(parseFloat(s.Duracao_Min||0)/60); return a; },{});
        let labels = Object.keys(horasPorDia).slice(-7), data = labels.map(l=>horasPorDia[l]);
        container.innerHTML = `<div class="card"><div class="card-title"><i class="fas fa-chart-line"></i> Evolução (últimos 7 dias)</div><canvas id="evolucaoChart" height="150"></canvas></div>`;
        setTimeout(()=>{ new Chart(document.getElementById('evolucaoChart'), { type:'line', data:{ labels, datasets:[{ label:'Horas', data, borderColor:'#FF7B00' }] } }); },50);
    },

    // ---------- FOCO (antigo) ----------
    renderFocusMode(container) {
        container.innerHTML = `
            <div class="card"><div class="card-title"><i class="fas fa-stopwatch"></i> Modo Foco</div>
                <div class="timer-display" id="focusTimer">00:00:00</div>
                <div style="display:flex; gap:12px; margin:24px 0;">
                    <button id="startFocusBtn" class="primary-btn" style="width:auto">Iniciar</button>
                    <button id="pauseFocusBtn" class="primary-btn" style="width:auto">Pausar</button>
                    <button id="saveFocusBtn" class="primary-btn" style="width:auto">Salvar Sessão</button>
                </div>
                <div><input id="focusDiscipline" placeholder="Disciplina" value="Foco"></div>
            </div>`;
        let timerSec = 0, interval=null, running=false;
        const update = () => { document.getElementById('focusTimer').innerText = new Date(timerSec*1000).toISOString().substr(11,8); };
        document.getElementById('startFocusBtn').onclick = ()=>{ if(!running){ running=true; interval=setInterval(()=>{ timerSec++; update(); },1000); } };
        document.getElementById('pauseFocusBtn').onclick = ()=>{ running=false; clearInterval(interval); };
        document.getElementById('saveFocusBtn').onclick = async ()=>{
            let disc = document.getElementById('focusDiscipline').value.trim()||"Geral";
            let dur = Math.round(timerSec/60);
            if(dur<=0) { showToast("Estude ao menos 1 min"); return; }
            await addRow("SESSOES", { Data: new Date().toISOString().slice(0,10), Duracao_Min: dur, Disciplina: disc, Tipo: "Foco", Status: "Concluído" });
            showToast("Sessão salva!"); timerSec=0; update(); running=false; clearInterval(interval);
            await loadAllData();
        };
    },

    // ---------- GESTÃO (antigo, com todas as sub-abas) ----------
    renderGestao(container) {
        container.innerHTML = `
            <div class="sub-nav">
                <button class="sub-nav-item ${activeSubTab==='conteudo'?'active':''}" data-sub="conteudo">📚 Conteúdo</button>
                <button class="sub-nav-item ${activeSubTab==='sessoes'?'active':''}" data-sub="sessoes">⏱ Sessões</button>
                <button class="sub-nav-item ${activeSubTab==='plano'?'active':''}" data-sub="plano">📅 Plano</button>
                <button class="sub-nav-item ${activeSubTab==='questoes'?'active':''}" data-sub="questoes">❓ Questões</button>
                <button class="sub-nav-item ${activeSubTab==='disciplinas'?'active':''}" data-sub="disciplinas">🏷 Disciplinas</button>
            </div>
            <div id="subContent"></div>
        `;
        document.querySelectorAll('.sub-nav-item').forEach(b => b.onclick = ()=> { activeSubTab = b.dataset.sub; this.renderGestao(container); });
        const sub = document.getElementById('subContent');
        if(activeSubTab==='conteudo') this.renderConteudo(sub);
        else if(activeSubTab==='sessoes') this.renderSessoes(sub);
        else if(activeSubTab==='plano') this.renderPlanoEstudo(sub);
        else if(activeSubTab==='questoes') this.renderQuestoes(sub);
        else if(activeSubTab==='disciplinas') this.renderDisciplinas(sub);
    },

    renderSessoes(container) {

            <div class="card"><div class="card-title">➕ Registrar Sessão</div>
                <form id="formSessao">
                    <div class="form-group"><label>Data</label><input id="dataSessao" type="date" required></div>

            e.preventDefault();

            showToast("Disciplina adicionada!"); document.getElementById('formDisciplina').reset(); await loadAllData();
        };
        renderList();
    }
};

// ====================== NAVEGAÇÃO ======================
function initNavigation() {
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
            activeTab = btn.dataset.tab;
            document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            disciplinaSelecionada = null;
            renderCurrentTab();
        });
    });
    document.getElementById('fabFocusBtn').onclick = () => {
        activeTab = 'focus';
        document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
        document.querySelector('[data-tab="focus"]').classList.add('active');
        renderCurrentTab();
    };
    document.getElementById('reportHeaderBtn').onclick = () => {
        activeTab = 'reports';
        document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
        document.querySelector('[data-tab="reports"]').classList.add('active');
        renderCurrentTab();
    };
}

// Inicialização
loadAllData();
initNavigation();
</script>
