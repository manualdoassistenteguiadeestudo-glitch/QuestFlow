<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>QuestFlow — Gestão Completa</title>
    <!-- Fonts e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0B1120, #0F172A);
            color: #F8FAFC;
            overflow-x: hidden;
        }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes glowPulse { 0% { text-shadow: 0 0 0 #FF7B00; } 100% { text-shadow: 0 0 12px #FF7B00; } }
        .tab-content { animation: fadeSlideUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        button, .nav-item, .fab-btn { transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        button:active, .nav-item:active { transform: scale(0.96); }
        .app-container { max-width: 1300px; margin: 0 auto; padding: 20px 24px 90px; }
        .header {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;
            margin-bottom: 32px; padding: 12px 24px; background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px);
            border-radius: 48px; border: 1px solid rgba(255, 123, 0, 0.2); box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .logo { display: flex; align-items: center; gap: 14px; }
        .logo-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 123, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 12px rgba(255, 123, 0, 0.5);
            border: 1px solid rgba(255, 123, 0, 0.4);
        }
        .logo-icon img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            filter: drop-shadow(0 0 4px #FF7B00);
        }
        .logo-text h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #FF7B00, #FFB347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-text p { font-size: 0.7rem; color: #94A3B8; }
        .streak-badge { background: linear-gradient(135deg, #2A2A35, #1E293B); padding: 8px 20px; border-radius: 60px; display: flex; align-items: center; gap: 12px; font-weight: 700; color: #FACC15; border: 1px solid rgba(250,204,21,0.3); }
        .report-btn-header {
            background: linear-gradient(95deg, #FF7B00, #6366F1);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(255,123,0,0.3);
        }
        .report-btn-header:hover { transform: scale(1.02); box-shadow: 0 8px 20px rgba(255,123,0,0.5); }
        .report-btn-header img {
            width: 20px;
            height: 20px;
            filter: brightness(0) invert(1);
        }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(20px); display: flex; gap: 8px; padding: 8px 20px; border-radius: 60px; border: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: transparent; border: none; font-size: 0.7rem; font-weight: 500; color: #94A3B8; cursor: pointer; padding: 8px 16px; border-radius: 40px; }
        .nav-item i { font-size: 1.3rem; }
        .nav-item.active { color: #FF7B00; background: rgba(255, 123, 0, 0.15); transform: translateY(-2px); }
        .fab-btn { position: fixed; bottom: 100px; right: 24px; background: linear-gradient(135deg, #FF7B00, #6366F1); width: 56px; height: 56px; border-radius: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(255,123,0,0.5); z-index: 110; cursor: pointer; }
        .card { background: #1E293B; border-radius: 32px; padding: 28px; border: 1px solid rgba(255, 123, 0, 0.15); box-shadow: 0 15px 35px -12px rgba(0,0,0,0.4); transition: all 0.25s ease; margin-bottom: 28px; }
        .card:hover { transform: translateY(-4px); border-color: #FF7B00; }
        .card-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; color: #FFB347; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #CBD5E1; }
        input, select, textarea { width: 100%; padding: 12px 16px; background: #0F172A; border: 1px solid #334155; border-radius: 24px; color: white; font-family: inherit; transition: 0.2s; }
        input:focus, select:focus { outline: none; border-color: #FF7B00; box-shadow: 0 0 0 2px rgba(255,123,0,0.2); }
        button.primary-btn { background: linear-gradient(95deg, #FF7B00, #6366F1); border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; width: 100%; }
        .data-table { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px 8px; border-bottom: 1px solid #334155; }
        th { color: #FFB347; }
        .action-btn { background: none; border: none; color: #FF7B00; cursor: pointer; margin: 0 4px; font-size: 1rem; }
        .sub-nav { display: flex; gap: 12px; margin-bottom: 24px; border-bottom: 1px solid #334155; padding-bottom: 12px; flex-wrap: wrap; }
        .sub-nav-item { background: transparent; border: none; padding: 8px 20px; border-radius: 40px; color: #94A3B8; cursor: pointer; }
        .sub-nav-item.active { background: #FF7B00; color: white; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1E293B; border-left: 4px solid #FF7B00; padding: 12px 24px; border-radius: 60px; z-index: 1000; animation: fadeSlideUp 0.2s ease; }
        .loading-overlay { position: fixed; top:0;left:0;width:100%;height:100%;background: rgba(15,23,42,0.9);backdrop-filter: blur(12px);display: flex;align-items: center;justify-content: center;z-index: 1000;visibility: hidden;opacity: 0;transition: 0.2s; }
        .loading-overlay.active { visibility: visible; opacity: 1; }
        .spinner { width: 48px; height: 48px; border: 4px solid #2A2A35; border-top: 4px solid #FF7B00; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .task-item, .progress-bar { margin-bottom: 16px; }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #334155; }
        .progress-bar { height: 12px; background: #0F172A; border-radius: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #FF7B00, #FFB347); border-radius: 20px; width: 0%; }
        .timer-display { font-size: 4rem; font-weight: 800; text-align: center; font-variant-numeric: tabular-nums; }
        .chip { background: #2A2A35; padding: 4px 12px; border-radius: 40px; font-size: 0.8rem; }
        @media (max-width: 680px) { .app-container { padding: 16px; } .bottom-nav { gap: 4px; padding: 6px 12px; } .nav-item { padding: 6px 10px; } }
    </style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="app-container" id="app">
    <div class="header">
        <div class="logo">
            <div class="logo-icon">
                <!-- Ícone do capacete (Flaticon) -->
                <img src="https://cdn-icons-png.flaticon.com/512/2276/2276592.png" alt="Capacete guerreiro" style="width: 32px; height: 32px;">
            </div>
            <div class="logo-text">
                <h1>QuestFlow</h1>
                <p>performance & evolução</p>
            </div>
        </div>
        <div class="streak-badge"><i class="fas fa-fire"></i> <span id="streakValue">0</span> dias</div>
        <button id="reportHeaderBtn" class="report-btn-header">
            <!-- Ícone de relatório (Flaticon) -->
            <img src="https://cdn-icons-png.flaticon.com/512/8328/8328461.png" alt="Relatório" style="width: 20px; height: 20px;">
            Relatórios
        </button>
    </div>
    <div id="tabContent" class="tab-content"></div>
    <footer style="text-align:center; margin-top:40px; font-size:0.7rem; color:#475569;">⚡ Gestão completa • CRUD integrado com SheetDB</footer>
</div>
<div class="bottom-nav" id="bottomNav">
    <button class="nav-item active" data-tab="dashboard"><i class="fas fa-chart-line"></i><span>Visão</span></button>
    <button class="nav-item" data-tab="planner"><i class="fas fa-calendar-week"></i><span>Plano</span></button>
    <button class="nav-item" data-tab="gestao"><i class="fas fa-database"></i><span>Gestão</span></button>
    <button class="nav-item" data-tab="reports"><i class="fas fa-chart-simple"></i><span>Relatórios</span></button>
    <button class="nav-item" data-tab="focus"><i class="fas fa-clock"></i><span>Foco</span></button>
</div>
<div class="fab-btn" id="fabFocusBtn"><i class="fas fa-play"></i></div>

<script>
// ====================== CONFIGURAÇÃO SHEETDB ======================
const BASE_API = "https://sheetdb.io/api/v1/yzz4a1hv8hm9w"; // Nova URL fornecida

// Estados globais para cada tabela (todas as abas)
let resumo = [];
let disciplinas = [];
let planoDiario = [];
let revisoes = [];
let questoes = [];
let planoEstudo = [];
let conteudos = [];
let estatisticas = [];
let sessoes = [];
let notificacoes = [];

let activeTab = "dashboard";
let activeSubTab = "conteudo"; // dentro da gestão

// Helper toast e loading
function showToast(msg, type='info') {
    const toast = document.createElement('div'); 
    toast.className = 'toast'; 
    toast.innerHTML = `<i class="fas ${type==='error'?'fa-exclamation-triangle':'fa-check-circle'}"></i> ${msg}`;
    document.body.appendChild(toast); 
    setTimeout(()=>toast.remove(), 3000);
}
function showLoading(show) { 
    const el = document.getElementById('loadingOverlay'); 
    if(el) show ? el.classList.add('active') : el.classList.remove('active'); 
}

// ====================== FUNÇÕES CRUD GENÉRICAS ======================
async function fetchSheet(sheetName) {
    const url = `${BASE_API}?sheet=${sheetName}`;
    const resp = await fetch(url);
    if(!resp.ok) throw new Error(`Erro ao buscar ${sheetName}`);
    const data = await resp.json();
    return data;
}

async function addRow(sheetName, rowData) {
    const url = `${BASE_API}?sheet=${sheetName}`;
    const resp = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ data: [rowData] }) // SheetDB espera array
    });
    if(!resp.ok) throw new Error(`Erro ao adicionar em ${sheetName}`);
    return await resp.json();
}

async function updateRow(sheetName, rowId, updatedData) {
    const url = `${BASE_API}/id/${rowId}?sheet=${sheetName}`;
    const resp = await fetch(url, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ data: updatedData })
    });
    if(!resp.ok) throw new Error(`Erro ao atualizar ${sheetName}`);
    return await resp.json();
}

async function deleteRow(sheetName, rowId) {
    const url = `${BASE_API}/id/${rowId}?sheet=${sheetName}`;
    const resp = await fetch(url, { method: "DELETE" });
    if(!resp.ok) throw new Error(`Erro ao deletar de ${sheetName}`);
    return await resp.json();
}

// ====================== CARREGAR TODOS OS DADOS ======================
async function loadAllData() {
    showLoading(true);
    try {
        const [
            r, d, pd, rev, q, pe, c, e, s, n
        ] = await Promise.all([
            fetchSheet("RESUMO").catch(()=>[]),
            fetchSheet("DISCIPLINAS").catch(()=>[]),
            fetchSheet("PLANO_DIARIO").catch(()=>[]),
            fetchSheet("REVISOES").catch(()=>[]),
            fetchSheet("QUESTOES").catch(()=>[]),
            fetchSheet("PLANO_ESTUDO").catch(()=>[]),
            fetchSheet("CONTEUDO").catch(()=>[]),
            fetchSheet("ESTATISTICAS").catch(()=>[]),
            fetchSheet("SESSOES").catch(()=>[]),
            fetchSheet("NOTIFICACOES").catch(()=>[])
        ]);
        resumo = r;
        disciplinas = d;
        planoDiario = pd;
        revisoes = rev;
        questoes = q;
        planoEstudo = pe;
        conteudos = c;
        estatisticas = e;
        sessoes = s;
        notificacoes = n;

        updateStreakFromSessoes();
        renderCurrentTab();
    } catch(err) { 
        showToast("Erro ao carregar dados: "+err.message, "error"); 
    } finally { 
        showLoading(false); 
    }
}

function updateStreakFromSessoes() {
    if(!sessoes.length) return;
    const dates = [...new Set(sessoes.map(s => s.Data ? new Date(s.Data).toDateString() : null).filter(d=>d))];
    let streak = 0; 
    let current = new Date();
    // Contagem de dias consecutivos
    while(true) { 
        if(dates.includes(current.toDateString())) streak++; 
        else break; 
        current.setDate(current.getDate()-1); 
    }
    document.getElementById('streakValue').innerText = streak;
}

// ====================== UI RENDER ======================
function renderCurrentTab() {
    const container = document.getElementById('tabContent');
    if(!container) return;
    if(activeTab === 'gestao') UIRenderer.renderGestao(container);
    else if(activeTab === 'dashboard') UIRenderer.renderDashboard(container);
    else if(activeTab === 'planner') UIRenderer.renderPlanner(container);
    else if(activeTab === 'reports') UIRenderer.renderReports(container);
    else if(activeTab === 'focus') UIRenderer.renderFocusMode(container);
    else UIRenderer.renderDashboard(container);
}

const UIRenderer = {
    renderDashboard(container) {
        let totalHoras = sessoes.reduce((acc,s)=> acc + (parseFloat(s.Duracao_Min||0)/60 || 0), 0);
        let totalQuestoes = questoes.length;
        let progresso = Math.min(100, (totalHoras/50)*100);
        container.innerHTML = `
            <div class="card"><div class="card-title"><i class="fas fa-chart-line"></i> Visão Geral</div>
            <div class="task-item"><span>⏱ Total Horas</span><strong style="font-size:2rem">${totalHoras.toFixed(1)}h</strong></div>
            <div class="progress-bar mt-2"><div class="progress-fill" style="width:${progresso}%"></div></div>
            <div class="task-item"><span>📚 Conteúdos cadastrados</span><strong>${conteudos.length}</strong></div>
            <div class="task-item"><span>🎯 Sessões realizadas</span><strong>${sessoes.length}</strong></div>
            <div class="task-item"><span>📋 Questões respondidas</span><strong>${totalQuestoes}</strong></div>
            </div>
            <div class="card"><div class="card-title"><i class="fas fa-history"></i> Últimas Sessões</div><div id="ultimasSessoes"></div></div>
        `;
        let ultimas = [...sessoes].sort((a,b)=> new Date(b.Data) - new Date(a.Data)).slice(0,5);
        document.getElementById('ultimasSessoes').innerHTML = ultimas.map(s=>`<div class="task-item"><span>${s.Data||'—'}</span><span>${s.Disciplina||'?'}</span><span>${s.Duracao_Min||0}min</span></div>`).join('');
    },
    renderPlanner(container) {
        // Utiliza PLANO_ESTUDO e PLANO_DIARIO para exibir planejamento
        let planos = planoEstudo.length ? planoEstudo : planoDiario;
        container.innerHTML = `<div class="card"><div class="card-title"><i class="fas fa-calendar-alt"></i> Plano de Estudos</div><div id="planList"></div></div>`;
        let html = '';
        if (planos.length) {
            planos.slice(0,10).forEach(p => {
                html += `<div class="task-item"><span>📖 ${p.Disciplina || p.Tipo || 'Estudo'}</span><span class="chip">${p.Tempo_Min || p.Tempo_Planejado || '?'} min</span></div>`;
            });
        } else {
            html = '<p>Nenhum plano cadastrado. Use a aba Gestão para adicionar.</p>';
        }
        document.getElementById('planList').innerHTML = html;
    },
    renderReports(container) {
        if(!sessoes.length) { container.innerHTML = `<div class="card">Nenhuma sessão registrada.</div>`; return; }
        let horasPorDia = sessoes.reduce((acc,s)=>{ let data = s.Data; if(data) acc[data] = (acc[data]||0) + (parseFloat(s.Duracao_Min||0)/60); return acc; },{});
        let labels = Object.keys(horasPorDia).slice(-7);
        let data = labels.map(l=>horasPorDia[l]);
        container.innerHTML = `<div class="card"><div class="card-title"><i class="fas fa-chart-line"></i> Evolução (últimos 7 dias)</div><canvas id="evolucaoChart" height="150"></canvas></div>`;
        setTimeout(()=>{
            const ctx = document.getElementById('evolucaoChart')?.getContext('2d');
            if(ctx) new Chart(ctx, { type:'line', data:{ labels, datasets:[{ label:'Horas', data, borderColor:'#FF7B00', tension:0.3 }] } });
        },50);
    },
    renderFocusMode(container) {
        container.innerHTML = `
            <div class="card">
                <div class="card-title"><i class="fas fa-stopwatch"></i> Modo Foco</div>
                <div class="timer-display" id="focusTimer">00:00:00</div>
                <div style="display:flex; gap:12px; margin:24px 0;">
                    <button id="startFocusBtn" class="primary-btn" style="width:auto">Iniciar</button>
                    <button id="pauseFocusBtn" class="primary-btn" style="width:auto">Pausar</button>
                    <button id="saveFocusBtn" class="primary-btn" style="width:auto">Salvar Sessão</button>
                </div>
                <div><input id="focusDiscipline" placeholder="Disciplina" value="Foco"></div>
            </div>`;
        let timerSec = 0, interval=null, running=false;
        const updateDisplay = () => { const el=document.getElementById('focusTimer'); if(el) el.innerText = new Date(timerSec*1000).toISOString().substr(11,8); };
        document.getElementById('startFocusBtn').onclick = () => { if(!running) { running=true; interval=setInterval(()=>{ timerSec++; updateDisplay(); },1000); } };
        document.getElementById('pauseFocusBtn').onclick = () => { running=false; if(interval) clearInterval(interval); };
        document.getElementById('saveFocusBtn').onclick = async () => {
            let disc = document.getElementById('focusDiscipline').value.trim() || "Geral";
            let duracao = Math.round(timerSec/60);
            if(duracao<=0) { showToast("Estude ao menos 1 minuto"); return; }
            try {
                await addRow("SESSOES", { 
                    Data: new Date().toISOString().slice(0,10), 
                    Hora_Inicio: "", Hora_Fim: "", 
                    Duracao_Min: duracao, 
                    Disciplina: disc, 
                    Tipo: "Foco", 
                    Status: "Concluído" 
                });
                showToast("Sessão salva!");
                timerSec=0; updateDisplay(); running=false; if(interval) clearInterval(interval);
                await loadAllData();
            } catch(e) { showToast("Erro ao salvar", "error"); }
        };
    },
    renderGestao(container) {
        container.innerHTML = `
            <div class="sub-nav" id="subNav">
                <button class="sub-nav-item ${activeSubTab==='conteudo'?'active':''}" data-sub="conteudo">📚 Conteúdo</button>
                <button class="sub-nav-item ${activeSubTab==='sessoes'?'active':''}" data-sub="sessoes">⏱ Sessões</button>
                <button class="sub-nav-item ${activeSubTab==='plano'?'active':''}" data-sub="plano">📅 Plano</button>
                <button class="sub-nav-item ${activeSubTab==='questoes'?'active':''}" data-sub="questoes">❓ Questões</button>
                <button class="sub-nav-item ${activeSubTab==='disciplinas'?'active':''}" data-sub="disciplinas">🏷 Disciplinas</button>
            </div>
            <div id="subContent"></div>
        `;
        document.querySelectorAll('.sub-nav-item').forEach(btn => {
            btn.onclick = () => { activeSubTab = btn.dataset.sub; this.renderGestao(container); };
        });
        const subContainer = document.getElementById('subContent');
        if(activeSubTab === 'conteudo') this.renderConteudo(subContainer);
        else if(activeSubTab === 'sessoes') this.renderSessoes(subContainer);
        else if(activeSubTab === 'plano') this.renderPlanoEstudo(subContainer);
        else if(activeSubTab === 'questoes') this.renderQuestoes(subContainer);
        else if(activeSubTab === 'disciplinas') this.renderDisciplinas(subContainer);
    },
    renderConteudo(container) {
        container.innerHTML = `
            <div class="card">
                <div class="card-title">➕ Novo Conteúdo</div>
                <form id="formConteudo">
                    <div class="form-group"><label>Disciplina</label><input id="disc" required></div>
                    <div class="form-group"><label>Assunto</label><input id="assunto" required></div>
                    <div class="form-group"><label>Subassunto</label><input id="subassunto"></div>
                    <div class="form-group"><label>Peso</label><input id="peso" type="number" step="0.1"></div>
                    <button type="submit" class="primary-btn">Adicionar</button>
                </form>
            </div>
            <div class="card"><div class="card-title">📋 Lista de Conteúdos</div><div id="listaConteudos"></div></div>
        `;
        const renderList = () => {
            const listDiv = document.getElementById('listaConteudos');
            if(!listDiv) return;
            listDiv.innerHTML = `<div class="data-table"><table><thead><tr><th>Disciplina</th><th>Assunto</th><th>Peso</th><th>Ações</th></tr></thead><tbody>
                ${conteudos.map(c => `<tr><td>${c.Disciplina||''}</td><td>${c.Assunto||''}</td><td>${c.Peso||''}</td><td><button class="action-btn" data-id="${c._id}" data-action="delete"><i class="fas fa-trash"></i></button></td></tr>`).join('')}
            </tbody></table></div>`;
            document.querySelectorAll('[data-action="delete"]').forEach(btn => {
                btn.onclick = async () => { if(confirm("Remover?")) { await deleteRow("CONTEUDO", btn.dataset.id); await loadAllData(); } };
            });
        };
        document.getElementById('formConteudo').onsubmit = async (e) => {
            e.preventDefault();
            const newItem = {
                Disciplina: document.getElementById('disc').value,
                Assunto: document.getElementById('assunto').value,
                Subassunto: document.getElementById('subassunto').value,
                Peso: parseFloat(document.getElementById('peso').value) || 0,
                Status: "Pendente"
            };
            try { await addRow("CONTEUDO", newItem); showToast("Conteúdo adicionado!"); document.getElementById('formConteudo').reset(); await loadAllData(); } catch(err) { showToast("Erro: "+err.message,"error"); }
        };
        renderList();
    },
    renderSessoes(container) {
        container.innerHTML = `
            <div class="card">
                <div class="card-title">➕ Registrar Sessão</div>
                <form id="formSessao">
                    <div class="form-group"><label>Data</label><input id="dataSessao" type="date" required></div>

// ====================== NAVEGAÇÃO ======================
function initNavigation() {
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
            activeTab = btn.dataset.tab;
            document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            renderCurrentTab();
        });
    });
    document.getElementById('fabFocusBtn').addEventListener('click', () => {
        activeTab = 'focus';
        document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
        document.querySelector('[data-tab="focus"]').classList.add('active');
        renderCurrentTab();
    });
    document.getElementById('reportHeaderBtn').addEventListener('click', () => {
        activeTab = 'reports';
        document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
        document.querySelector('[data-tab="reports"]').classList.add('active');
        renderCurrentTab();
    });
}

// ====================== INICIALIZAÇÃO ======================
loadAllData();
initNavigation();
</script>
