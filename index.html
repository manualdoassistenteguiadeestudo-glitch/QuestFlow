<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>QuestFlow — Evolução Premium</title>
    <!-- Google Fonts + Font Awesome 6 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0B1120, #0F172A);
            color: #F8FAFC;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animações globais */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes glowPulse {
            0% { text-shadow: 0 0 0 #FF7B00; }
            100% { text-shadow: 0 0 12px #FF7B00, 0 0 6px #FF7B00; }
        }
        @keyframes cardHover {
            0% { transform: translateY(0); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
            100% { transform: translateY(-6px); box-shadow: 0 20px 30px -10px rgba(255,123,0,0.2); }
        }
        .tab-content {
            animation: fadeSlideUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        button, .nav-item, .fab-btn {
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        button:active, .nav-item:active, .fab-btn:active {
            transform: scale(0.96);
        }
        /* Layout principal */
        .app-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px 24px 90px;
        }
        /* Header premium */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
            padding: 12px 24px;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(255, 123, 0, 0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .logo-icon {
            font-size: 2.4rem;
            color: #FF7B00;
            filter: drop-shadow(0 0 6px rgba(255,123,0,0.6));
            transition: transform 0.2s;
        }
        .logo:hover .logo-icon {
            transform: scale(1.02);
        }
        .logo-text h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FF7B00, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo-text p {
            font-size: 0.7rem;
            color: #94A3B8;
        }
        .streak-badge {
            background: linear-gradient(135deg, #2A2A35, #1E293B);
            padding: 8px 20px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            color: #FACC15;
            border: 1px solid rgba(250,204,21,0.3);
            backdrop-filter: blur(4px);
        }
        .report-btn-header {
            background: linear-gradient(95deg, #FF7B00, #6366F1);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(255,123,0,0.3);
        }
        .report-btn-header:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(255,123,0,0.5);
            background: linear-gradient(95deg, #FF8C1A, #7C6FF5);
        }
        /* Bottom Navigation moderna */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            font-size: 0.7rem;
            font-weight: 500;
            color: #94A3B8;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 40px;
            transition: 0.2s;
        }
        .nav-item i {
            font-size: 1.3rem;
        }
        .nav-item.active {
            color: #FF7B00;
            background: rgba(255, 123, 0, 0.15);
            transform: translateY(-2px);
        }
        .fab-btn {
            position: fixed;
            bottom: 100px;
            right: 24px;
            background: linear-gradient(135deg, #FF7B00, #6366F1);
            width: 56px;
            height: 56px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(255,123,0,0.5);
            z-index: 110;
            cursor: pointer;
        }
        .fab-btn i {
            font-size: 1.8rem;
            color: white;
        }
        /* Cards premium */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 28px;
            margin-bottom: 40px;
        }
        .card {
            background: #1E293B;
            border-radius: 32px;
            padding: 28px;
            border: 1px solid rgba(255, 123, 0, 0.15);
            box-shadow: 0 15px 35px -12px rgba(0,0,0,0.4);
            transition: all 0.25s ease;
            backdrop-filter: blur(2px);
        }
        .card:hover {
            transform: translateY(-6px);
            border-color: #FF7B00;
            box-shadow: 0 25px 40px -15px rgba(255,123,0,0.25);
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #FFB347;
            letter-spacing: -0.2px;
        }
        .stat-number {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FF7B00, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }
        .progress-bar {
            background: #0F172A;
            border-radius: 40px;
            height: 12px;
            overflow: hidden;
            margin: 16px 0;
        }
        .progress-fill {
            background: linear-gradient(90deg, #FF7B00, #6366F1);
            width: 0%;
            height: 100%;
            border-radius: 40px;
            transition: width 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .chip {
            background: rgba(255,123,0,0.2);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #FFB347;
        }
        .timer-display {
            font-size: 3.5rem;
            font-weight: 800;
            font-family: monospace;
            text-align: center;
            background: #0F172A;
            padding: 20px;
            border-radius: 40px;
            letter-spacing: 6px;
            border: 1px solid #FF7B00;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .motivation-toast {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E293B;
            border-left: 4px solid #FF7B00;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 1000;
            animation: fadeSlideUp 0.2s ease;
            backdrop-filter: blur(12px);
        }
        .loading-overlay {
            position: fixed;
            top:0;left:0;
            width:100%;height:100%;
            background: rgba(15,23,42,0.9);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .spinner {
            width: 54px;
            height: 54px;
            border: 4px solid #2A2A35;
            border-top: 4px solid #FF7B00;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-success, .status-warning {
            border-radius: 40px;
            padding: 6px 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }
        .status-success { background: rgba(34,197,94,0.15); color: #4ADE80; }
        .status-warning { background: rgba(239,68,68,0.15); color: #F87171; }
        /* Modal Relatório */
        .modal-overlay {
            position: fixed;
            top:0;left:0;
            width:100%;height:100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: #1E293B;
            border-radius: 40px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 28px;
            border: 1px solid #FF7B00;
            box-shadow: 0 30px 40px rgba(0,0,0,0.5);
        }
        .modal-content h3 {
            font-size: 1.6rem;
            margin-bottom: 20px;
            color: #FF7B00;
        }
        .report-table {
            width: 100%;
            border-collapse: collapse;
        }
        .report-table th, .report-table td {
            text-align: left;
            padding: 14px 8px;
            border-bottom: 1px solid #334155;
        }
        .report-table th { color: #FFB347; }
        .close-modal {
            background: linear-gradient(95deg, #FF7B00, #6366F1);
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 600;
            margin-top: 24px;
            cursor: pointer;
            width: 100%;
            color: white;
        }
        footer {
            margin-top: 48px;
            text-align: center;
            font-size: 0.7rem;
            color: #475569;
        }
        @media (max-width: 680px) {
            .app-container { padding: 16px 16px 100px; }
            .header { flex-direction: column; align-items: stretch; text-align: center; }
            .bottom-nav { gap: 4px; padding: 6px 12px; }
            .nav-item { padding: 6px 10px; }
            .stat-number { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="app-container" id="app">
    <div class="header">
        <div class="logo">
            <i class="fas fa-helmet-battle logo-icon"></i>
            <div class="logo-text">
                <h1>QuestFlow</h1>
                <p>performance & evolução</p>
            </div>
        </div>
        <div class="streak-badge" id="streakElement">
            <i class="fas fa-fire"></i> <span id="streakValue">0</span> dias em sequência
        </div>
        <button id="reportHeaderBtn" class="report-btn-header"><i class="fas fa-chart-simple"></i> Relatórios</button>
    </div>
    <div id="authStatus" class="status-badge" style="margin-bottom: 20px; background: #1E293B;"><i class="fas fa-check-circle"></i> ✅ Planilha sincronizada</div>
    <div id="tabContent" class="tab-content"></div>
    <footer>⚡ Dados em tempo real • Gamificação inteligente</footer>
</div>
<div class="bottom-nav" id="bottomNav">
    <button class="nav-item active" data-tab="dashboard"><i class="fas fa-chart-line"></i><span>Visão</span></button>
    <button class="nav-item" data-tab="planner"><i class="fas fa-calendar-week"></i><span>Plano</span></button>
    <button class="nav-item" data-tab="content"><i class="fas fa-book-open"></i><span>Conteúdo</span></button>
    <button class="nav-item" data-tab="reviews"><i class="fas fa-rotate-right"></i><span>Revisões</span></button>
    <button class="nav-item" data-tab="questions"><i class="fas fa-question-circle"></i><span>Questões</span></button>
    <button class="nav-item" data-tab="reports"><i class="fas fa-chart-simple"></i><span>Relatórios</span></button>
    <button class="nav-item" data-tab="focus"><i class="fas fa-clock"></i><span>Foco</span></button>
    <button class="nav-item" data-tab="settings"><i class="fas fa-sliders-h"></i><span>Ajustes</span></button>
</div>
<div class="fab-btn" id="fabFocusBtn"><i class="fas fa-play"></i></div>

<script>
// ====================== CONEXÃO SHEETDB ======================
const SHEETDB_API_URL = "https://sheetdb.io/api/v1/7o3coa2jghj2r";
let rawSheetData = [];
let lastRecord = null;

const showToast = (msg, type='info') => {
    const toast = document.createElement('div');
    toast.className = 'motivation-toast';
    toast.innerHTML = `<i class="fas ${type==='error'?'fa-exclamation-triangle':'fa-face-smile'}"></i> ${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
};
const showLoading = (show) => {
    const overlay = document.getElementById('loadingOverlay');
    if(overlay) show ? overlay.classList.add('active') : overlay.classList.remove('active');
};

// ====================== ESTADO GLOBAL ======================
const AppState = {
    _data: { rawSheets: [], columnMapping: {}, disciplines: new Map(), sessions: [], reviewQueue: [], questionsData: { history: [], accuracy: 0 }, stats: { totalHours: 0 }, notifications: [] },
    _listeners: [],
    getState() { return this._data; },
    setState(updater) { const newState = typeof updater === 'function' ? updater(this._data) : updater; Object.assign(this._data, newState); this._listeners.forEach(fn=>fn(this._data)); },
    updateSpecific(key,val) { this._data[key]=val; this._listeners.forEach(fn=>fn(this._data)); },
    subscribe(fn) { this._listeners.push(fn); return ()=> this._listeners=this._listeners.filter(l=>l!==fn); }
};

// ====================== SERVIÇO DE PLANILHA ======================
const SheetService = {
    async carregarDados() {
        const resp = await fetch(SHEETDB_API_URL);
        if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
        return await resp.json();
    },
    async carregarEProcessar() {
        showLoading(true);
        try {
            const rows = await this.carregarDados();
            if(!rows || !rows.length) throw new Error("Nenhum dado encontrado");
            rawSheetData = rows;
            const sorted = [...rows].sort((a,b)=> new Date(b.Data || b.data) - new Date(a.Data || a.data));
            lastRecord = sorted[0] || null;
            const headers = Object.keys(rows[0]);
            const dataRows = rows.map(row => { let obj = {}; headers.forEach(h => { obj[h] = row[h] || ''; }); return obj; });
            const sheetData = { name: "Principal", headers, data: dataRows };
            AppState.updateSpecific('rawSheets', [sheetData]);
            this.intelligentMappingAndBuildState(sheetData);
            document.getElementById('authStatus').innerHTML = `<i class="fas fa-check-circle"></i> ✅ Planilha carregada • ${rows.length} registros`;
            showToast("Dados sincronizados! 🚀");
            return rows;
        } catch(err) {
            console.error(err);
            showToast("Erro ao carregar planilha: "+err.message, "error");
            document.getElementById('authStatus').innerHTML = `<i class="fas fa-exclamation-triangle"></i> ⚠️ Erro: ${err.message}`;
        } finally { showLoading(false); }
    },
    intelligentMappingAndBuildState(sheet) {
        const headers = sheet.headers.map(h=>h?.toLowerCase()||'');
        let dateCol = headers.find(h=>/data|date|dia/i.test(h));
        let timeCol = headers.find(h=>/horas|hora|tempo|estudadas/i.test(h));
        let disciplineCol = headers.find(h=>/disciplina|matéria|assunto/i.test(h));
        const disciplineSet = new Map();
        let totalHours = 0, sessionsRaw = [];
        for(const row of sheet.data) {
            let discipline = disciplineCol ? (row[disciplineCol]||"Geral").trim() : "Geral";
            let hours = 0;
            let timeVal = timeCol ? row[timeCol] : null;
            if(timeVal) { let m = String(timeVal).match(/(\d+(?:[.,]\d+)?)/); if(m) hours = parseFloat(m[1].replace(',','.')); }
            let rawDate = dateCol ? row[dateCol] : null;
            let dateObj = rawDate ? new Date(rawDate) : null;
            if(dateObj && isNaN(dateObj)) dateObj = new Date();
            if(hours>0) {
                totalHours += hours;
                sessionsRaw.push({ date: dateObj || new Date(), discipline, duration: hours, completed: true });
            }
            if(!disciplineSet.has(discipline)) disciplineSet.set(discipline, { totalHours:0, topics:[] });
            disciplineSet.get(discipline).totalHours += hours;
        }
        AppState.setState({ disciplines: disciplineSet, sessions: sessionsRaw, stats: { totalHours } });
        this.generateSmartReviews();
        this.updateNotifications();
    },
    generateSmartReviews() {
        const data = AppState.getState();
        const now = new Date();
        const reviewMap = new Map();
        for(const sess of data.sessions) {
            if(!sess.date) continue;
            const daysDiff = Math.floor((now - sess.date)/(1000*3600*24));
            if(daysDiff>=1 && daysDiff<=7) reviewMap.set(sess.discipline, { discipline: sess.discipline, dueDays: daysDiff });
        }
        let queue = Array.from(reviewMap.values()).slice(0,3);
        if(queue.length===0 && data.disciplines.size) queue = Array.from(data.disciplines.keys()).slice(0,2).map(d=>({ discipline: d, dueDays: 2 }));
        AppState.updateSpecific('reviewQueue', queue);
    },
    updateNotifications() {
        const data = AppState.getState();
        let notifs = [];
        if(data.stats.totalHours === 0) notifs.push("🔥 Comece registrando horas!");
        if(data.reviewQueue.length) notifs.push(`🔄 ${data.reviewQueue.length} revisões pendentes`);
        AppState.updateSpecific('notifications', notifs);
    },
    generateStudyPlan() {
        const data = AppState.getState();
        let list = Array.from(data.disciplines.entries()).map(([n,d])=>({ name: n, hours: d.totalHours })).sort((a,b)=>a.hours-b.hours);
        return list.slice(0,4).map(d=>({ discipline: d.name, suggestedHours: 1.5, reason: "prioridade" }));
    },
    generateDailyTasks() {
        const data = AppState.getState();
        let tasks = [];
        for(let [disc, discData] of data.disciplines.entries()) {
            if(discData.totalHours < 2) tasks.push({ discipline: disc, priority: "recomendado" });
        }
        if(!tasks.length && data.disciplines.size) tasks = [{ discipline: Array.from(data.disciplines.keys())[0], priority: "foco" }];
        return tasks.slice(0,3);
    }
};

// ====================== TIMER ======================
const TimerService = {
    _elapsed:0, _running:false, _interval:null, _listeners:[],
    init() { const saved = localStorage.getItem('questflow_timer'); if(saved) try { const d=JSON.parse(saved); this._elapsed=d.elapsed||0; this._running=d.running||false; if(this._running) this.start(); } catch(e){} window.addEventListener('beforeunload',()=>this.persist()); },
    persist() { localStorage.setItem('questflow_timer', JSON.stringify({ elapsed: this._elapsed, running: this._running })); },
    getElapsed() { return this._elapsed; },
    start() { if(this._interval) return; this._running=true; this._interval=setInterval(()=>{ if(this._running){ this._elapsed++; this._listeners.forEach(fn=>fn(this._elapsed)); this.persist(); } },1000); this.persist(); },
    pause() { this._running=false; if(this._interval) clearInterval(this._interval); this._interval=null; this.persist(); },
    reset() { this.pause(); this._elapsed=0; this._listeners.forEach(fn=>fn(this._elapsed)); this.persist(); },
    subscribe(fn) { this._listeners.push(fn); return ()=> this._listeners=this._listeners.filter(l=>l!==fn); }
};

// ====================== UI RENDER ======================
let activeTab = "dashboard";
let currentCharts = {};

function renderPlanilhaCard() {
    if(!lastRecord) return '<div class="card">Nenhum dado disponível</div>';
    const dataStr = lastRecord.Data || lastRecord.data || "—";
    const horas = parseFloat(lastRecord.horas_estudadas ?? 0);
    const meta = parseFloat(lastRecord.Meta ?? 0);
    const sequencia = parseInt(lastRecord.Sequencia ?? lastRecord.sequencia ?? 0, 10);
    const cumpriu = (lastRecord.cumpriu_meta ?? "").toString().toLowerCase();
    const cumpriuMeta = (cumpriu === "sim" || cumpriu === "true");
    const statusClass = cumpriuMeta ? "status-success" : "status-warning";
    const statusIcon = cumpriuMeta ? "fa-check-circle" : "fa-exclamation-circle";
    const statusText = cumpriuMeta ? "Meta cumprida! 🎯" : "Meta não cumprida ⚠️";
    return `
        <div class="card">
            <div class="card-title"><i class="fas fa-crown"></i> Último registro</div>
            <div class="task-item"><span>📅 Data</span><strong style="color:#FFB347">${dataStr}</strong></div>
            <div class="task-item"><span>⏱ Horas estudadas</span><strong class="stat-number" style="font-size:1.8rem">${horas.toFixed(1)}h</strong></div>
            <div class="task-item"><span>🎯 Meta diária</span><strong>${meta.toFixed(1)}h</strong></div>
            <div class="task-item"><span>🔥 Sequência (streak)</span><strong class="stat-number" style="font-size:1.5rem">${sequencia} dias</strong></div>
            <div class="task-item"><span>✅ Status</span><div class="${statusClass}"><i class="fas ${statusIcon}"></i> ${statusText}</div></div>
        </div>
    `;
}

const UIRenderer = {
    render() {
        const container = document.getElementById('tabContent');
        if(!container) return;
        switch(activeTab) {
            case "dashboard": this.renderDashboard(container); break;
            case "planner": this.renderPlanner(container); break;
            case "content": this.renderContent(container); break;
            case "reviews": this.renderReviews(container); break;
            case "questions": this.renderQuestions(container); break;
            case "reports": this.renderReports(container); break;
            case "focus": this.renderFocusMode(container); break;
            case "settings": this.renderSettings(container); break;
            default: this.renderDashboard(container);
        }
    },
    renderDashboard(container) {
        const state = AppState.getState();
        const dailyTasks = SheetService.generateDailyTasks();
        const totalHours = state.stats.totalHours;
        const progressPerc = Math.min(100, (totalHours/50)*100);
        const planilhaCard = renderPlanilhaCard();
        container.innerHTML = `
            <div class="dashboard-grid">
                ${planilhaCard}
                <div class="card"><div class="card-title"><i class="fas fa-hourglass-half"></i> Total acumulado</div><div class="stat-number">${totalHours.toFixed(1)}h</div><div class="progress-bar"><div class="progress-fill" style="width:${progressPerc}%"></div></div><div>⚡ meta mensal 50h</div></div>
                <div class="card"><div class="card-title"><i class="fas fa-list-check"></i> Tarefas do dia</div><div id="dailyTasksList"></div></div>
                <div class="card"><div class="card-title"><i class="fas fa-bell"></i> Notificações</div><div id="notifList"></div></div>
            </div>
            <div class="card"><div class="card-title"><i class="fas fa-chart-line"></i> Distribuição por disciplina</div><canvas id="disciplinesChart" height="120"></canvas></div>
        `;
        document.getElementById('dailyTasksList').innerHTML = dailyTasks.map(t=>`<div class="task-item"><span>📖 ${t.discipline}</span><span class="chip">${t.priority}</span></div>`).join('');
        document.getElementById('notifList').innerHTML = state.notifications.length ? state.notifications.map(n=>`<div>✨ ${n}</div>`).join('') : "<div>🏆 Tudo em dia!</div>";
        setTimeout(()=>{
            const ctx = document.getElementById('disciplinesChart')?.getContext('2d');
            if(ctx) {
                if(currentCharts.disciplinesChart) currentCharts.disciplinesChart.destroy();
                let labels = Array.from(state.disciplines.keys()).slice(0,5);
                let data = labels.map(d=>state.disciplines.get(d)?.totalHours||0);
                currentCharts.disciplinesChart = new Chart(ctx, { type:'bar', data:{ labels, datasets:[{ label:'Horas', data, backgroundColor: '#FF7B00', borderRadius: 12 }] }, options:{ responsive: true, plugins: { legend: { labels: { color: '#94A3B8' } } } } });
            }
        },50);
    },
    renderPlanner(container) { let plan = SheetService.generateStudyPlan(); container.innerHTML = `<div class="card"><div class="card-title"><i class="fas fa-calendar-alt"></i> Plano de estudos inteligente</div><div id="planList"></div></div>`; document.getElementById('planList').innerHTML = plan.map(p=>`<div class="task-item"><span>🎯 ${p.discipline}</span><span>${p.suggestedHours}h</span><span class="chip">${p.reason}</span></div>`).join(''); },
    renderContent(container) { const state = AppState.getState(); let html=""; for(let [disc,d] of state.disciplines.entries()) html += `<div class="task-item"><strong><i class="fas fa-graduation-cap"></i> ${disc}</strong> <span>${d.totalHours.toFixed(1)}h</span> ${d.topics.length?`<span class="chip">${d.topics.slice(0,2).join(', ')}</span>`:''}</div>`; container.innerHTML = `<div class="card"><div class="card-title"><i class="fas fa-layer-group"></i> Conteúdos registrados</div>${html||'<p>Nenhum tópico específico.</p>'}</div>`; },
    renderReviews(container) { const revs = AppState.getState().reviewQueue; container.innerHTML = `<div class="card"><div class="card-title"><i class="fas fa-rotate-right"></i> Revisões estratégicas</div><div id="reviewList"></div></div>`; document.getElementById('reviewList').innerHTML = revs.length? revs.map(r=>`<div class="task-item"><span>📅 ${r.discipline}</span><span>vencimento ${r.dueDays}d</span><button class="chip" onclick="window.dispatchEvent(new CustomEvent('completeReview',{detail:{discipline:'${r.discipline}'}}))">✅ Revisar</button></div>`).join('') : "<p>🎉 Nenhuma revisão pendente!</p>"; },
    renderQuestions(container) { const state = AppState.getState(); container.innerHTML = `<div class="card"><div class="card-title"><i class="fas fa-square-check"></i> Banco de questões</div><div>Desempenho: <strong class="stat-number">${state.questionsData.accuracy.toFixed(1)}%</strong></div><div class="progress-bar mt-2"><div class="progress-fill" style="width:${state.questionsData.accuracy}%; background:#22C55E;"></div></div><div id="questionHistory"></div><button id="addManualQuestionBtn" class="btn-outline mt-3"><i class="fas fa-plus-circle"></i> Registrar manual</button></div>`; document.getElementById('questionHistory').innerHTML = state.questionsData.history.slice(-5).map(q=>`<div>📊 ${q.discipline}: ${q.right}/${q.total}</div>`).join(''); document.getElementById('addManualQuestionBtn')?.addEventListener('click',()=>{ let disc=prompt("Disciplina"), right=parseInt(prompt("Acertos")), total=parseInt(prompt("Total")); if(!isNaN(right)&&!isNaN(total)&&total>0){ const newHist=[...state.questionsData.history,{right,total,discipline:disc||"Manual"}]; let totalR=newHist.reduce((a,b)=>a+b.right,0), totalT=newHist.reduce((a,b)=>a+b.total,0); AppState.setState({questionsData:{history:newHist, accuracy:totalT?(totalR/totalT)*100:0}}); UIRenderer.renderQuestions(container); showToast("Questão registrada!"); } }); },
    renderReports(container) { 
        if(!rawSheetData || !rawSheetData.length) { container.innerHTML = `<div class="card">Nenhum dado para exibir no relatório.</div>`; return; }
        let tableHtml = `<table class="report-table"><thead><tr><th>Data</th><th>Horas</th><th>Meta</th><th>Cumpriu?</th><th>Streak</th></thead><tbody>`;
        const sorted = [...rawSheetData].sort((a,b)=> new Date(b.Data||b.data) - new Date(a.Data||a.data));
        for(const row of sorted) {
            tableHtml += `<tr><td>${row.Data||row.data||"—"}</td><td>${parseFloat(row.horas_estudadas??0).toFixed(1)}h</td><td>${parseFloat(row.Meta??0).toFixed(1)}h</td><td>${(row.cumpriu_meta??"").toLowerCase()==="sim"?"✅ Sim":"❌ Não"}</td><td>${row.Sequencia??row.sequencia??0}</td></tr>`;
        }
        tableHtml += `</tbody></table>`;
        container.innerHTML = `<div class="card"><div class="card-title"><i class="fas fa-chart-simple"></i> Relatório completo de estudos</div>${tableHtml}</div>`;
    },
    renderFocusMode(container) {
        container.innerHTML = `<div class="card"><div class="card-title"><i class="fas fa-stopwatch"></i> Modo Foco Profundo</div><div class="timer-display" id="focusTimer">00:00:00</div><div style="display:flex; gap:12px; margin:24px 0;"><button id="startFocusBtn" style="background:#FF7B00"><i class="fas fa-play"></i> Iniciar</button><button id="pauseFocusBtn" style="background:#6366F1"><i class="fas fa-pause"></i> Pausar</button><button id="saveFocusBtn" style="background:#22C55E"><i class="fas fa-save"></i> Salvar</button></div><div><label><i class="fas fa-tag"></i> Disciplina: <input id="focusDiscipline" placeholder="Ex: Direito Constitucional" style="background:#0F172A; border:1px solid #FF7B00; padding:8px; border-radius:40px; width:100%; color:white;"></label></div></div>`;
        const updateDisplay = (sec)=>{ const el=document.getElementById('focusTimer'); if(el) el.innerText = new Date(sec*1000).toISOString().substr(11,8); };
        const unsub = TimerService.subscribe(updateDisplay); updateDisplay(TimerService.getElapsed());
        document.getElementById('startFocusBtn')?.addEventListener('click',()=>TimerService.start());
        document.getElementById('pauseFocusBtn')?.addEventListener('click',()=>TimerService.pause());
        document.getElementById('saveFocusBtn')?.addEventListener('click', async ()=>{
            let disc = document.getElementById('focusDiscipline').value.trim() || "Foco";
            let hours = TimerService.getElapsed()/3600;
            if(hours>0){
                const state = AppState.getState();
                const newSession = { date: new Date(), discipline: disc, duration: hours, completed: true };
                const updatedSessions = [...state.sessions, newSession];
                let totalHours = state.stats.totalHours + hours;
                let discMap = new Map(state.disciplines);
                if(!discMap.has(disc)) discMap.set(disc,{totalHours:0,topics:[]});
                discMap.get(disc).totalHours += hours;
                AppState.setState({ sessions: updatedSessions, disciplines: discMap, stats: { ...state.stats, totalHours } });
                SheetService.generateSmartReviews(); SheetService.updateNotifications();
                try { await fetch(SHEETDB_API_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ data: { Data: new Date().toISOString().slice(0,10), Disciplina: disc, Horas: hours, Status:"Concluído" } }) }); showToast("Sessão salva na planilha! ✅"); } catch(e) { showToast("Sessão salva localmente", "error"); }
                TimerService.reset(); showToast(`🔥 Sessão de ${hours.toFixed(1)}h registrada!`);
                UIRenderer.render();
            } else showToast("Estude ao menos alguns segundos","error");
        });
    },
    renderSettings(container) { container.innerHTML = `<div class="card"><div class="card-title"><i class="fas fa-sliders-h"></i> Configurações & Mapeamento</div><p>O sistema detecta automaticamente colunas como Data, horas_estudadas, Meta, Sequencia, cumpriu_meta. Atualmente conectado à planilha com ${rawSheetData?.length||0} registros.</p><button id="refreshSheetBtn" class="btn-outline mt-3" style="background:#FF7B00"><i class="fas fa-sync-alt"></i> Recarregar dados</button></div>`; document.getElementById('refreshSheetBtn')?.addEventListener('click',()=>SheetService.carregarEProcessar().then(()=>UIRenderer.render())); }
};

// ====================== MODAL RELATÓRIO ======================
function openReportModal() {
    const modal = document.getElementById('reportModal');
    if(!modal) return;
    const container = modal.querySelector('.modal-content');
    if(!rawSheetData || !rawSheetData.length) { container.innerHTML = `<h3><i class="fas fa-chart-line"></i> Histórico</h3><p>Nenhum dado disponível</p><button class="close-modal" id="closeModalBtn">Fechar</button>`; }
    else {
        let tableHtml = `<table class="report-table"><thead><tr><th>Data</th><th>Horas</th><th>Meta</th><th>Cumpriu?</th><th>Streak</th></thead><tbody>`;
        const sorted = [...rawSheetData].sort((a,b)=> new Date(b.Data||b.data) - new Date(a.Data||a.data));
        for(const row of sorted) {
            tableHtml += `<tr><td>${row.Data||row.data||"—"}</td><td>${parseFloat(row.horas_estudadas??0).toFixed(1)}h</td><td>${parseFloat(row.Meta??0).toFixed(1)}h</td><td>${(row.cumpriu_meta??"").toLowerCase()==="sim"?"✅ Sim":"❌ Não"}</td><td>${row.Sequencia??row.sequencia??0}</td></tr>`;
        }
        tableHtml += `</tbody></table><button class="close-modal" id="closeModalBtn">Fechar</button>`;
        container.innerHTML = `<h3><i class="fas fa-chart-line"></i> Relatório avançado</h3>${tableHtml}`;
    }
    modal.classList.add('active');
    document.getElementById('closeModalBtn')?.addEventListener('click',()=>modal.classList.remove('active'));
}

// ====================== EVENTOS E INICIALIZAÇÃO ======================
window.addEventListener('completeReview', (e) => showToast(`🎉 Revisão de ${e.detail.discipline} concluída!`));
document.getElementById('fabFocusBtn')?.addEventListener('click',()=>{ activeTab="focus"; document.querySelectorAll('.nav-item').forEach(btn=>btn.classList.remove('active')); const focusNav=Array.from(document.querySelectorAll('.nav-item')).find(n=>n.dataset.tab==="focus"); if(focusNav) focusNav.classList.add('active'); UIRenderer.render(); });
document.getElementById('reportHeaderBtn')?.addEventListener('click', openReportModal);
const navItems = document.querySelectorAll('.nav-item');
navItems.forEach(btn=>{ btn.addEventListener('click',()=>{ activeTab=btn.dataset.tab; navItems.forEach(b=>b.classList.remove('active')); btn.classList.add('active'); UIRenderer.render(); }); });
TimerService.init();
AppState.subscribe(()=>UIRenderer.render());
SheetService.carregarEProcessar().then(()=>UIRenderer.render());
UIRenderer.render();

const modalDiv = document.createElement('div');
modalDiv.id = "reportModal";
modalDiv.className = "modal-overlay";
modalDiv.innerHTML = `<div class="modal-content"></div>`;
document.body.appendChild(modalDiv);
modalDiv.addEventListener('click', (e)=> { if(e.target === modalDiv) modalDiv.classList.remove('active'); });
</script>
